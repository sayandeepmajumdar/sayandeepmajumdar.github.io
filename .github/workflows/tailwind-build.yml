name: Tailwind Build

on:
  push:
    branches:
      - main
      - master
    paths:
      - "index.html"
      - "src/tailwind.css"
      - "tailwind.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/tailwind-build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tailwind:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build

      - name: Commit built CSS if changed
        run: |
          if git diff --quiet -- assets/css/site.min.css; then
            echo "No Tailwind output changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/css/site.min.css
          git commit -m "chore: rebuild tailwind css [skip ci]"
          git push
