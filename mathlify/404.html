<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Mathlify</title>
  <meta name="description" content="The page you are looking for was not found.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧮</text></svg>">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <!-- Redirect to SPA -->
  <script>
    // GitHub Pages 404 trick — redirect to index with path in hash
    const path = window.location.pathname.replace('/calculator-site', '');
    window.location.replace('/calculator-site/#' + path);
  </script>
</head>
<body>
  <div class="site-wrapper">
    <div class="not-found">
      <div class="not-found__code">404</div>
      <h1 class="not-found__title">Calculator Not Found</h1>
      <p class="not-found__desc">The page you're looking for doesn't exist.</p>
      <a href="/calculator-site/" class="btn btn--primary">← Back to Mathlify</a>
    </div>
  </div>
</body>
</html>
