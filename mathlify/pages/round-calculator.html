<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>

</head>
<body>
<div class="page-content">
  <div class="container">
    <div class="page-header">
      <div class="page-header__breadcrumb">
        <a href="#/">Home</a>
        <span>›</span>
        <span>Rounding Calculator</span>

      <h1 class="page-header__title">Rounding Calculator</h1>

    <div class="calc-layout" style="max-width:900px">
      <div id="calc-mount"></div>

          <p style="font-size:.875rem;color:var(--color-text-muted);line-height:1.7;margin-top:.5rem">
