<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Root Calculator — Mathlify</title>
  <meta name="description" content="Calculate square roots, cube roots, and n-th roots effortlessly.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📐</text></svg>">
</head>
<body>
<div class="page-content">
  <div class="container">
    <div class="page-header">
      <div class="page-header__breadcrumb">
        <a href="#/">Home</a>
        <span>›</span>
        <span>Root Calculator</span>
      </div>
      <h1 class="page-header__title">Root Calculator</h1>
      <p class="page-header__desc">Find the $n$-th root of any number quickly and accurately.</p>
    </div>

    <div class="calc-layout" style="max-width:900px">
      <div id="calc-mount"></div>
      <div>
        <div class="card" style="cursor:default;margin-bottom:1rem">
          <div class="card__title">📐 All Roots</div>
          <p style="font-size:.875rem;color:var(--color-text-muted);line-height:1.7;margin-top:.5rem">
            The $n$-th root of a number $x$ is a number $r$ which, when raised to the power $n$, equals $x$.
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
