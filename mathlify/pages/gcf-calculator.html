<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCF Calculator — Mathlify</title>
  <meta name="description" content="Calculate the Greatest Common Factor of multiple numbers easily.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>">
</head>
<body>
<div class="page-content">
  <div class="container">
    <div class="page-header">
      <div class="page-header__breadcrumb">
        <a href="#/">Home</a>
        <span>›</span>
        <span>GCF Calculator</span>
      </div>
      <h1 class="page-header__title">GCF Calculator</h1>
      <p class="page-header__desc">The Greatest Common Factor (GCF), also known as the Highest Common Factor (HCF).</p>
    </div>

    <div class="calc-layout" style="max-width:900px">
      <div id="calc-mount"></div>
      <div>
        <div class="card" style="cursor:default;margin-bottom:1rem">
          <div class="card__title">🔢 What is GCF?</div>
          <p style="font-size:.875rem;color:var(--color-text-muted);line-height:1.7;margin-top:.5rem">
            The GCF is the largest positive integer that divides two or more integers without leaving a remainder.
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

</html>
