<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mathlify — Simplifying Everyday Math</title>
  <meta name="description"
    content="Mathlify offers free, fast, and accurate online calculators — standard, scientific, BMI, age, percentage, mortgage and more. No ads, no sign-up.">
  <meta name="keywords"
    content="online calculator, scientific calculator, BMI calculator, age calculator, mortgage calculator, percentage calculator">
  <meta name="author" content="Mathlify">
  <meta property="og:title" content="Mathlify — Simplifying Everyday Math">
  <meta property="og:description" content="Fast, accurate, beautifully designed calculators for everyday use.">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://sayandeepmajumdar.github.io/calculator-site/">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧮</text></svg>">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
</head>

<body>
  <div class="site-wrapper">

    <!-- ── Header ──────────────────────────────────────────── -->
    <header class="site-header" role="banner">
      <div class="container">
        <a class="site-logo" href="#/" aria-label="Mathlify home">
          <div class="site-logo__icon" aria-hidden="true">∑</div>
          <span class="site-logo__text">Mathlify</span>
        </a>

        <nav class="site-nav" role="navigation" aria-label="Main navigation">
          <a class="site-nav__link active" href="#/" aria-label="Home">Home</a>

          <div class="site-nav__item">
            <span class="site-nav__link">Financial ▾</span>
            <div class="site-nav__dropdown">
              <a href="#/mortgage-calculator" class="site-nav__drop-link">Mortgage Calculator</a>
              <a href="#/amortization-calculator" class="site-nav__drop-link">Amortization Calculator</a>
            </div>
          </div>

          <div class="site-nav__item">
            <span class="site-nav__link">Health & Fitness ▾</span>
            <div class="site-nav__dropdown">
              <a href="#/bmi-calculator" class="site-nav__drop-link">BMI Calculator</a>
              <a href="#/age-calculator" class="site-nav__drop-link">Age Calculator</a>
            </div>
          </div>

          <div class="site-nav__item">
            <span class="site-nav__link">Math ▾</span>
            <div class="site-nav__dropdown">
              <a href="#/scientific-calculator" class="site-nav__drop-link">Scientific Calculator</a>
              <a href="#/percentage-calculator" class="site-nav__drop-link">Percentage Calculator</a>
            </div>
          </div>
        </nav>

        <div class="site-header__actions">
          <button class="btn btn--icon" id="theme-toggle" aria-label="Switch to dark mode"
            title="Toggle theme">🌙</button>
          <button class="mobile-menu-toggle" id="mobile-menu-btn" aria-label="Toggle menu">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- ── App / Router Target ─────────────────────────────── -->
    <main id="app" role="main" aria-live="polite" aria-atomic="false"></main>

    <!-- ── Footer ──────────────────────────────────────────── -->
    <footer class="site-footer" role="contentinfo">
      <div class="container">
        <span class="site-footer__copy">© Mathlify · Free online calculators</span>
        <nav class="site-footer__links" aria-label="Footer navigation">
          <a href="#/">Home</a>
          <a href="#/">Financial</a>
          <a href="#/">Health & Fitness</a>
          <a href="#/">Math</a>
          <a href="sitemap.xml" target="_blank">Sitemap</a>
        </nav>
      </div>
    </footer>

  </div><!-- /.site-wrapper -->

  <!-- ── Scripts ─────────────────────────────────────────────── -->
  <script type="module" src="assets/js/main.js"></script>

</html>
